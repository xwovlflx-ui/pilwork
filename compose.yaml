services:
  postgres:
    image: postgres:16-alpine
    container_name: fillwork-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fillwork}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-fillwork_dev}
    ports:
      - "5432:5432"
    volumes:
      - fillwork_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fillwork} -d ${POSTGRES_DB:-fillwork_dev}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  fillwork_postgres_data:

